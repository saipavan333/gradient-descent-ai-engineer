<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" width="700" height="360" role="img">
  <rect x="0" y="0" width="700" height="360" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Precision vs recall: same TP, two different denominators</text>
  <circle cx="300" cy="180" r="110" fill="#10b981" fill-opacity="0.16" stroke="#10b981" stroke-width="2"/>
  <circle cx="410" cy="180" r="110" fill="#38bdf8" fill-opacity="0.16" stroke="#38bdf8" stroke-width="2"/>
  <text x="254.0" y="180.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">FN</text>
  <text x="254.0" y="198.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">missed</text>
  <text x="456.0" y="180.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">FP</text>
  <text x="456.0" y="198.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">false alarm</text>
  <text x="355.0" y="180.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">TP</text>
  <text x="254.0" y="102.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Actual positives</text>
  <text x="456.0" y="102.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Predicted positives</text>
  <text x="195.0" y="330.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Recall = TP / (TP+FN)</text>
  <text x="195.0" y="348.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">of all real positives, how many found?</text>
  <text x="515.0" y="330.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Precision = TP / (TP+FP)</text>
  <text x="515.0" y="348.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">of all flagged, how many correct?</text>
</svg>
