<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" width="700" height="300" role="img">
  <rect x="0" y="0" width="700" height="300" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">A framework for any AI system design interview</text>
  <rect x="10.0" y="120.0" width="120.0" height="60.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="70.0" y="145.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#065f46" text-anchor="middle" dominant-baseline="middle">1. Clarify</text>
  <text x="70.0" y="162.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">requirements</text>
  <rect x="150.0" y="120.0" width="120.0" height="60.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="210.0" y="145.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#312e81" text-anchor="middle" dominant-baseline="middle">2. High-level</text>
  <text x="210.0" y="162.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#312e81" text-anchor="middle" dominant-baseline="middle">design</text>
  <rect x="290.0" y="120.0" width="120.0" height="60.0" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="350.0" y="145.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">3. Data &amp;</text>
  <text x="350.0" y="162.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">model</text>
  <rect x="430.0" y="120.0" width="120.0" height="60.0" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="490.0" y="145.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle" dominant-baseline="middle">4. Scale</text>
  <text x="490.0" y="162.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">it up</text>
  <rect x="570.0" y="120.0" width="120.0" height="60.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="630.0" y="145.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#075985" text-anchor="middle" dominant-baseline="middle">5. Trade-offs</text>
  <text x="630.0" y="162.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">&amp; wrap up</text>
  <line x1="130.0" y1="150.0" x2="150.0" y2="150.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M150.0,150.0 L140.9,145.9 L140.9,154.1 Z" fill="#475569"/>
  <line x1="270.0" y1="150.0" x2="290.0" y2="150.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M290.0,150.0 L280.9,145.9 L280.9,154.1 Z" fill="#475569"/>
  <line x1="410.0" y1="150.0" x2="430.0" y2="150.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M430.0,150.0 L420.9,145.9 L420.9,154.1 Z" fill="#475569"/>
  <line x1="550.0" y1="150.0" x2="570.0" y2="150.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M570.0,150.0 L560.9,145.9 L560.9,154.1 Z" fill="#475569"/>
  <text x="350.0" y="232.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Drive the interview: nail requirements first, sketch the system, then go deep and scale.</text>
  <text x="350.0" y="254.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Always state assumptions out loud and reason about trade-offs — that's what's being tested.</text>
</svg>
