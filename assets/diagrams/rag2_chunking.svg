  <text x="360.0" y="262.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">overlap (shaded) keeps context from spilling across a cut; each chunk is embedded and stored</text>
