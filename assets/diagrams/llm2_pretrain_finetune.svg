<svg viewBox="0 0 740 340" xmlns="http://www.w3.org/2000/svg" width="740" height="340" role="img">
  <rect x="0" y="0" width="740" height="340" fill="#ffffff"/>
  <text x="370.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Pretraining builds broad knowledge; fine-tuning specializes it</text>
  <text x="190.0" y="80.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#312e81" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Stage 1: PRETRAIN (self-supervised)</text>
  <rect x="50.0" y="121.0" width="120.0" height="58.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="110.0" y="146.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">huge unlabeled</text>
  <text x="110.0" y="161.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">text (web)</text>
  <rect x="265.0" y="114.0" width="130.0" height="72.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="330.0" y="138.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#312e81" text-anchor="middle" dominant-baseline="middle">base model</text>
  <text x="330.0" y="153.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#312e81" text-anchor="middle" dominant-baseline="middle">(knows language</text>
  <text x="330.0" y="169.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#312e81" text-anchor="middle" dominant-baseline="middle">&amp; facts)</text>
  <line x1="170.0" y1="150.0" x2="265.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M265.0,150.0 L255.9,145.9 L255.9,154.1 Z" fill="#475569"/>
  <rect x="182.1" y="134.6" width="70.9" height="16.3" rx="5" fill="#ffffff" opacity="0.92"/>
  <text x="217.5" y="143.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" fill="#475569" text-anchor="middle" dominant-baseline="middle">next-token</text>
  <text x="560.0" y="80.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Stage 2: FINE-TUNE (supervised)</text>
  <rect x="500.0" y="84.0" width="120.0" height="52.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="560.0" y="106.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">small labeled</text>
  <text x="560.0" y="121.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">task data</text>
  <rect x="580.0" y="182.0" width="120.0" height="56.0" rx="12" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8"/>
  <text x="640.0" y="206.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">specialized</text>
  <text x="640.0" y="221.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">model</text>
  <line x1="395.0" y1="162.6" x2="580.0" y2="198.4" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M580.0,198.4 L571.8,192.7 L570.3,200.6 Z" fill="#94a3b8"/>
  <line x1="580.8" y1="136.0" x2="617.6" y2="182.0" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M617.6,182.0 L615.1,172.3 L608.7,177.4 Z" fill="#94a3b8"/>
  <text x="370.0" y="300.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">pretraining (once, expensive) gives general ability; fine-tuning (cheap) adapts it to a task or style</text>
</svg>
