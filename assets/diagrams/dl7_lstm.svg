<svg viewBox="0 0 700 330" xmlns="http://www.w3.org/2000/svg" width="700" height="330" role="img">
  <rect x="0" y="0" width="700" height="330" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">An LSTM adds a gated 'memory highway' for the cell state</text>
  <rect x="120.0" y="90.0" width="460.0" height="150.0" rx="12" fill="#f8fafc" stroke="#6366f1" stroke-width="2" opacity="1.0"/>
  <text x="140.0" y="108.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#312e81" text-anchor="start" opacity="1.0" dominant-baseline="middle">LSTM cell</text>
  <line x1="120.0" y1="130.0" x2="580.0" y2="130.0" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <path d="M580.0,130.0 L570.0,125.5 L570.0,134.5 Z" fill="#10b981"/>
  <text x="350.0" y="118.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">cell state  (memory highway — gradients flow freely)</text>
  <circle cx="185.0" cy="175.0" r="16.0" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="185.0" y="175.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="400" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">×</text>
  <text x="185.0" y="205.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="700" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">forget gate</text>
  <text x="185.0" y="219.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">what to drop</text>
  <line x1="185.0" y1="159.0" x2="185.0" y2="141.0" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="350.0" cy="175.0" r="16.0" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="350.0" y="175.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="400" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">+</text>
  <text x="350.0" y="205.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="700" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">input gate</text>
  <text x="350.0" y="219.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">what to add</text>
  <line x1="350.0" y1="159.0" x2="350.0" y2="141.0" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="515.0" cy="175.0" r="16.0" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="515.0" y="175.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="400" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">×</text>
  <text x="515.0" y="205.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="700" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">output gate</text>
  <text x="515.0" y="219.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">what to emit</text>
  <line x1="515.0" y1="159.0" x2="515.0" y2="141.0" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="230.0" y="268.0" width="240.0" height="40.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="350.0" y="292.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#312e81" text-anchor="middle" dominant-baseline="middle">hidden state hₜ (output)</text>
  <line x1="515.0" y1="191.0" x2="400.0" y2="268.0" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"/>
  <text x="350.0" y="316.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">gates learn what to forget, add, and output; the straight-through cell state keeps gradients alive</text>
</svg>
