<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" width="760" height="300" role="img">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>
  <text x="380.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Tool calling: the model decides, your code executes</text>
  <rect x="35.0" y="124.0" width="90.0" height="52.0" rx="12" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8"/>
  <text x="80.0" y="146.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">user</text>
  <text x="80.0" y="161.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">question</text>
  <rect x="190.0" y="116.0" width="120.0" height="68.0" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="250.0" y="139.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">LLM</text>
  <text x="250.0" y="153.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">picks a tool</text>
  <text x="250.0" y="168.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">+ arguments</text>
  <rect x="380.0" y="122.0" width="120.0" height="56.0" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="440.0" y="146.4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">your code</text>
  <text x="440.0" y="161.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">runs the tool</text>
  <rect x="550.0" y="122.0" width="120.0" height="56.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="610.0" y="146.4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">result</text>
  <text x="610.0" y="161.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">→ back to LLM</text>
  <line x1="125.0" y1="150.0" x2="190.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M190.0,150.0 L180.9,145.9 L180.9,154.1 Z" fill="#475569"/>
  <line x1="310.0" y1="150.0" x2="380.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M380.0,150.0 L370.9,145.9 L370.9,154.1 Z" fill="#475569"/>
  <rect x="305.2" y="135.0" width="79.6" height="15.5" rx="5" fill="#ffffff" opacity="0.92"/>
  <text x="345.0" y="143.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle" dominant-baseline="middle">{"tool":...}</text>
  <line x1="500.0" y1="150.0" x2="550.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M550.0,150.0 L540.9,145.9 L540.9,154.1 Z" fill="#475569"/>
  <path d="M610.0,122.0 L250.0,116.0" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M250.0,116.0 L259.1,120.2 L259.2,112.1 Z" fill="#94a3b8"/>
  <rect x="213.1" y="99.0" width="73.8" height="15.5" rx="5" fill="#ffffff" opacity="0.92"/>
  <text x="250.0" y="107.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">observation</text>
  <text x="380.0" y="250.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.6" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">the model never runs code itself — it emits a structured call; you execute it and feed the result back</text>
  <text x="380.0" y="272.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">then the model answers using the tool's result (or calls another tool)</text>
</svg>
