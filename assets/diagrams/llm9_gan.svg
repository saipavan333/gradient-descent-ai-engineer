  <text x="352.5" y="127.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle" dominant-baseline="middle">fake</text>
  <line x1="350.0" y1="205.9" x2="405.0" y2="184.9" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M405.0,184.9 L395.0,184.3 L397.9,191.9 Z" fill="#475569"/>
  <rect x="360.9" y="180.4" width="33.2" height="15.5" rx="5" fill="#ffffff" opacity="0.92"/>
  <text x="377.5" y="188.4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle" dominant-baseline="middle">real</text>
  <path d="M470.0,132.0 L470.0,70.0 L240.0,70.0 L240.0,84.0" fill="none" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="6 5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M240.0,84.0 L244.1,74.9 L235.9,74.9 Z" fill="#fb7185"/>
  <rect x="211.8" y="53.0" width="56.4" height="15.5" rx="5" fill="#ffffff" opacity="0.92"/>
  <text x="240.0" y="61.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" fill="#fb7185" text-anchor="middle" dominant-baseline="middle">feedback</text>
  <text x="360.0" y="272.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.6" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">the generator learns to fool the discriminator; the discriminator learns to catch fakes — until fakes look real</text>
</svg>
