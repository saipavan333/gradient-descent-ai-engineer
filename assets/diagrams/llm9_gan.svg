<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" width="700" height="300" role="img">
  <rect x="0" y="0" width="700" height="300" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">GAN: a generator and a discriminator compete</text>
  <rect x="36.0" y="84.0" width="88.0" height="52.0" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/>
  <text x="80.0" y="106.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">random</text>
  <text x="80.0" y="121.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">noise</text>
  <rect x="180.0" y="84.0" width="120.0" height="52.0" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="240.0" y="106.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">Generator</text>
  <text x="240.0" y="121.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">makes fakes</text>
  <rect x="405.0" y="132.0" width="130.0" height="56.0" rx="12" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8"/>
  <text x="470.0" y="156.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">Discriminator</text>
  <text x="470.0" y="171.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">real or fake?</text>
  <rect x="250.0" y="204.0" width="100.0" height="42.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="300.0" y="228.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">real data</text>
  <line x1="124.0" y1="110.0" x2="180.0" y2="110.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M180.0,110.0 L170.9,105.9 L170.9,114.1 Z" fill="#475569"/>
  <line x1="300.0" y1="123.0" x2="405.0" y2="145.9" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
