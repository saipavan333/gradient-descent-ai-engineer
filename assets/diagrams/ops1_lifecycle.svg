<svg viewBox="0 0 600 470" xmlns="http://www.w3.org/2000/svg" width="600" height="470" role="img">
  <rect x="0" y="0" width="600" height="470" fill="#ffffff"/>
  <text x="300.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">The ML lifecycle is a loop, not a line</text>
  <rect x="226.0" y="89.0" width="148.0" height="52.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="300.0" y="110.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#065f46" text-anchor="middle" dominant-baseline="middle">1. Data</text>
  <text x="300.0" y="127.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">collect &amp; clean</text>
  <rect x="368.7" y="192.6" width="148.0" height="52.0" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="442.7" y="214.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle" dominant-baseline="middle">2. Train</text>
  <text x="442.7" y="231.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">fit the model</text>
  <rect x="314.2" y="360.4" width="148.0" height="52.0" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="388.2" y="382.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">3. Evaluate</text>
  <text x="388.2" y="399.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">test &amp; validate</text>
  <rect x="137.8" y="360.4" width="148.0" height="52.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="211.8" y="382.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#312e81" text-anchor="middle" dominant-baseline="middle">4. Deploy</text>
  <text x="211.8" y="399.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#312e81" text-anchor="middle" dominant-baseline="middle">serve to users</text>
  <rect x="83.3" y="192.6" width="148.0" height="52.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="157.3" y="214.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#075985" text-anchor="middle" dominant-baseline="middle">5. Monitor</text>
  <text x="157.3" y="231.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">watch in prod</text>
  <line x1="335.8" y1="141.0" x2="406.9" y2="192.6" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M406.9,192.6 L401.9,184.0 L397.1,190.6 Z" fill="#475569"/>
  <line x1="434.2" y1="244.6" x2="396.6" y2="360.4" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M396.6,360.4 L403.3,352.9 L395.6,350.4 Z" fill="#475569"/>
  <line x1="314.2" y1="386.4" x2="285.8" y2="386.4" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M285.8,386.4 L295.0,390.4 L295.0,382.3 Z" fill="#475569"/>
  <line x1="203.4" y1="360.4" x2="165.8" y2="244.6" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M165.8,244.6 L164.7,254.6 L172.5,252.1 Z" fill="#475569"/>
  <line x1="193.1" y1="192.6" x2="264.2" y2="141.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M264.2,141.0 L254.4,143.1 L259.2,149.7 Z" fill="#475569"/>
  <text x="300.0" y="257.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#312e81" text-anchor="middle" opacity="1.0" dominant-baseline="middle">iterate</text>
  <text x="300.0" y="277.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">every release</text>
  <text x="300.0" y="452.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Monitoring feeds back into new data and retraining — the loop never really ends.</text>
</svg>
