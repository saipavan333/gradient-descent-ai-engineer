  <text x="242.0" y="114.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" font-weight="400" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">5</text>
