<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" width="620" height="300" role="img">
  <rect x="0" y="0" width="620" height="300" fill="#ffffff"/>
  <text x="310.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">The dot product: multiply pairs, then add</text>
  <rect x="150.0" y="92.0" width="56.0" height="44.0" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6" opacity="1.0"/>
