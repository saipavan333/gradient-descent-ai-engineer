<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" width="640" height="340" role="img">
  <rect x="0" y="0" width="640" height="340" fill="#ffffff"/>
  <text x="320.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Fairness: compare outcomes across groups</text>
  <line x1="150.0" y1="255.0" x2="470.0" y2="255.0" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="150.0" y1="255.0" x2="150.0" y2="89.0" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
  <text x="116.0" y="172.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle" transform="rotate(-90 116.0 172.0)">approval rate</text>
  <rect x="185.0" y="159.0" width="90.0" height="96.0" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8" opacity="1.0"/>
  <text x="230.0" y="145.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#312e81" text-anchor="middle" opacity="1.0" dominant-baseline="middle">60%</text>
  <text x="230.0" y="273.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Group A</text>
  <rect x="335.0" y="187.8" width="90.0" height="67.2" rx="6" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8" opacity="1.0"/>
  <text x="380.0" y="173.8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">42%</text>
  <text x="380.0" y="273.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Group B</text>
  <text x="500.0" y="150.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">ratio =</text>
  <text x="500.0" y="170.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">42 / 60</text>
  <text x="500.0" y="192.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">= 0.70</text>
  <text x="500.0" y="214.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">&lt; 0.80</text>
  <text x="320.0" y="300.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Four-fifths rule: if one group's rate is under 80% of another's, that's a red flag for disparate impact.</text>
</svg>
