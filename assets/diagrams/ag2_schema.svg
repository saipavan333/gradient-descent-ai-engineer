<svg viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" width="700" height="310" role="img">
  <rect x="0" y="0" width="700" height="310" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">A tool is described to the model by a schema</text>
  <rect x="120.0" y="90.0" width="460.0" height="150.0" rx="10" fill="#f8fafc" stroke="#6366f1" stroke-width="1.8" opacity="1.0"/>
  <text x="150.0" y="120.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="start" opacity="1.0" dominant-baseline="middle">name</text>
  <text x="300.0" y="120.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#1f2937" text-anchor="start" opacity="1.0" dominant-baseline="middle">get_weather</text>
  <text x="150.0" y="160.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#075985" text-anchor="start" opacity="1.0" dominant-baseline="middle">description</text>
  <text x="300.0" y="160.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#1f2937" text-anchor="start" opacity="1.0" dominant-baseline="middle">Get current weather for a city</text>
  <text x="150.0" y="200.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#92400e" text-anchor="start" opacity="1.0" dominant-baseline="middle">parameters</text>
  <text x="300.0" y="200.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#1f2937" text-anchor="start" opacity="1.0" dominant-baseline="middle">city: string (required)</text>
  <text x="360.0" y="270.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.6" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">the description and parameter types tell the model WHAT the tool does and HOW to call it — write them clearly</text>
  <text x="360.0" y="290.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">the model reads all available tool schemas, then chooses which to call and with what arguments</text>
</svg>
