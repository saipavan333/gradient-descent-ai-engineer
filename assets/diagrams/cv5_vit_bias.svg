<svg viewBox="0 0 720 330" xmlns="http://www.w3.org/2000/svg" width="720" height="330" role="img">
  <rect x="0" y="0" width="720" height="330" fill="#ffffff"/>
  <text x="360.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">CNN vs ViT: built-in assumptions vs learned-from-data</text>
  <rect x="40.0" y="70.0" width="320.0" height="205.0" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6" opacity="1.0"/>
  <rect x="400.0" y="70.0" width="290.0" height="205.0" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.6" opacity="1.0"/>
  <rect x="140.0" y="83.0" width="120.0" height="42.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="200.0" y="108.6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">CNN</text>
  <rect x="440.0" y="83.0" width="210.0" height="42.0" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="545.0" y="108.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">Vision Transformer</text>
  <text x="200.0" y="150.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">+ locality built in</text>
  <text x="200.0" y="176.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">+ translation invariance</text>
  <text x="200.0" y="202.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#312e81" text-anchor="middle" opacity="1.0" dominant-baseline="middle">strong prior → less data</text>
  <text x="545.0" y="150.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">few built-in assumptions</text>
  <text x="545.0" y="176.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">learns structure from data</text>
  <text x="545.0" y="202.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#5b21b6" text-anchor="middle" opacity="1.0" dominant-baseline="middle">weak prior → needs more data</text>
  <text x="200.0" y="244.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" font-style="italic" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">great default on modest datasets</text>
  <text x="545.0" y="244.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" font-style="italic" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">wins at large scale / pretraining</text>
  <text x="360.0" y="306.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">CNNs bake in how images work (nearby pixels relate); ViTs assume less and learn it — if given enough data.</text>
</svg>
