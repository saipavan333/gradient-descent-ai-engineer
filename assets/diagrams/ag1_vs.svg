  <text x="370.0" y="312.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">an agent = an LLM that decides which actions to take, in a loop, to reach a goal</text>
