<svg viewBox="0 0 620 330" xmlns="http://www.w3.org/2000/svg" width="620" height="330" role="img">
  <rect x="0" y="0" width="620" height="330" fill="#ffffff"/>
  <text x="310.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">IoU: how well does the predicted box overlap the truth?</text>
  <rect x="240.0" y="140.0" width="130.0" height="95.0" rx="10" fill="#fde68a" stroke="none" stroke-width="1.5" opacity="0.85"/>
  <rect x="150.0" y="95.0" width="220.0" height="140.0" rx="10" fill="none" stroke="#10b981" stroke-width="2.6" opacity="1.0"/>
  <rect x="240.0" y="140.0" width="220.0" height="140.0" rx="10" fill="none" stroke="#6366f1" stroke-width="2.6" opacity="1.0"/>
  <text x="156.0" y="107.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#065f46" text-anchor="start" opacity="1.0" dominant-baseline="middle">ground truth</text>
  <text x="454.0" y="272.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#312e81" text-anchor="end" opacity="1.0" dominant-baseline="middle">prediction</text>
  <text x="305.0" y="187.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">overlap</text>
  <text x="310.0" y="302.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">IoU = area of overlap ÷ area of union.  1.0 = perfect; a detection usually counts as correct at IoU ≥ 0.5.</text>
</svg>
