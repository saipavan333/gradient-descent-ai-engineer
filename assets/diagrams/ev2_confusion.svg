<svg viewBox="0 0 620 370" xmlns="http://www.w3.org/2000/svg" width="620" height="370" role="img">
  <rect x="0" y="0" width="620" height="370" fill="#ffffff"/>
  <text x="310.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Precision vs recall, from the confusion matrix</text>
  <text x="285.0" y="76.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Predicted +</text>
  <text x="435.0" y="76.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Predicted −</text>
  <text x="194" y="123" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle" transform="rotate(-90 194 123)">Actual +</text>
  <text x="194" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle" transform="rotate(-90 194 185)">Actual −</text>
  <rect x="210.0" y="92.0" width="150.0" height="62.0" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8" opacity="1.0"/>
  <text x="285.0" y="123.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">TP</text>
  <rect x="360.0" y="92.0" width="150.0" height="62.0" rx="6" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8" opacity="1.0"/>
  <text x="435.0" y="123.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">FN</text>
  <rect x="210.0" y="154.0" width="150.0" height="62.0" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8" opacity="1.0"/>
  <text x="285.0" y="185.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#92400e" text-anchor="middle" opacity="1.0" dominant-baseline="middle">FP</text>
  <rect x="360.0" y="154.0" width="150.0" height="62.0" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" opacity="1.0"/>
  <text x="435.0" y="185.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#475569" text-anchor="middle" opacity="1.0" dominant-baseline="middle">TN</text>
  <text x="310.0" y="258.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">precision = TP / (TP + FP)   — of predicted positives, how many were right?</text>
  <text x="310.0" y="284.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">recall = TP / (TP + FN)   — of actual positives, how many did we catch?</text>
  <text x="310.0" y="326.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">They trade off: a stricter threshold raises precision but lowers recall. F1 balances them.</text>
</svg>
