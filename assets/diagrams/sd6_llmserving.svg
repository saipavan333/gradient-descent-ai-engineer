  <text x="360.0" y="332.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">A queue plus dynamic batching feeds GPU workers; each keeps a KV cache; the pool autoscales with traffic.</text>
