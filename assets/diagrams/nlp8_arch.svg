<svg viewBox="0 0 740 340" xmlns="http://www.w3.org/2000/svg" width="740" height="340" role="img">
  <rect x="0" y="0" width="740" height="340" fill="#ffffff"/>
  <text x="370.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Three transformer shapes for three jobs</text>
  <rect x="40.0" y="82.0" width="210.0" height="212.0" rx="12" fill="#ffffff" stroke="#38bdf8" stroke-width="1.8" opacity="1.0"/>
  <text x="145.0" y="108.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13.5" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Encoder-only</text>
  <text x="145.0" y="130.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">BERT</text>
  <rect x="55.0" y="148.0" width="180.0" height="40.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="145.0" y="171.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">sees both directions</text>
  <text x="145.0" y="214.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">understand / classify</text>
  <text x="145.0" y="244.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.4" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">embed text, sentiment, search</text>
  <rect x="270.0" y="82.0" width="210.0" height="212.0" rx="12" fill="#ffffff" stroke="#fb7185" stroke-width="1.8" opacity="1.0"/>
  <text x="375.0" y="108.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13.5" font-weight="700" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Decoder-only</text>
  <text x="375.0" y="130.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">GPT</text>
  <rect x="285.0" y="148.0" width="180.0" height="40.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="375.0" y="171.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">sees only the past (causal)</text>
  <text x="375.0" y="214.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">generate text</text>
  <text x="375.0" y="244.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.4" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">chatbots, code, completion</text>
  <rect x="500.0" y="82.0" width="210.0" height="212.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.8" opacity="1.0"/>
  <text x="605.0" y="108.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13.5" font-weight="700" fill="#5b21b6" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Encoder–decoder</text>
  <text x="605.0" y="130.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">T5 / translation</text>
  <rect x="515.0" y="148.0" width="180.0" height="40.0" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="605.0" y="171.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">read all, then write</text>
  <text x="605.0" y="214.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">transform input → output</text>
  <text x="605.0" y="244.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.4" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">translation, summarization</text>
  <text x="370.0" y="322.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">same building block (attention + FFN); the difference is what each token is allowed to attend to</text>
</svg>
