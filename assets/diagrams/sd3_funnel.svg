  <text x="110.0" y="163.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">~10M items</text>
  <rect x="305.0" y="118.0" width="130.0" height="64.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
