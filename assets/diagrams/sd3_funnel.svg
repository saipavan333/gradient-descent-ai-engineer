  <text x="370.0" y="163.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">~500</text>
  <rect x="530.0" y="125.0" width="120.0" height="50.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
