  <rect x="0" y="0" width="700" height="300" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Recommendation = a funnel: generate, then rank</text>
