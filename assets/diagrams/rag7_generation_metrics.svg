<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" width="700" height="340" role="img">
  <rect x="0" y="0" width="700" height="340" fill="#ffffff"/>
  <text x="350.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">The RAG triad: is the generated answer trustworthy?</text>
  <circle cx="360.0" cy="110.0" r="44.0" fill="#ffffff" stroke="#fb7185" stroke-width="2"/>
  <text x="360.0" y="104.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Query</text>
  <circle cx="180.0" cy="270.0" r="44.0" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
  <text x="180.0" y="264.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Context</text>
  <text x="180.0" y="278.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">(retrieved)</text>
  <circle cx="540.0" cy="270.0" r="44.0" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="540.0" y="264.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Answer</text>
  <line x1="330.0" y1="140.0" x2="198.0" y2="236.0" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"/>
  <text x="220.0" y="185.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">context relevance</text>
  <line x1="224.0" y1="270.0" x2="496.0" y2="270.0" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"/>
  <text x="360.0" y="255.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">faithfulness</text>
  <text x="360.0" y="288.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="9.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">(answer grounded in context?)</text>
  <line x1="390.0" y1="140.0" x2="522.0" y2="236.0" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"/>
  <text x="500.0" y="185.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">answer relevance</text>
  <text x="360.0" y="322.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">faithful (no hallucination) + relevant (answers the question) + good context = a trustworthy RAG answer</text>
