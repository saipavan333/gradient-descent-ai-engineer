<svg viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" width="680" height="270" role="img">
  <rect x="0" y="0" width="680" height="270" fill="#ffffff"/>
  <text x="340.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Split the data: train, validate, test — and never peek</text>
  <rect x="70.0" y="110.0" width="378.0" height="58.0" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8" opacity="1.0"/>
  <text x="259.0" y="131.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Train</text>
  <text x="259.0" y="151.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">70%</text>
  <rect x="448.0" y="110.0" width="81.0" height="58.0" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8" opacity="1.0"/>
  <text x="488.5" y="131.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Validation</text>
  <text x="488.5" y="151.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">15%</text>
  <rect x="529.0" y="110.0" width="81.0" height="58.0" rx="6" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8" opacity="1.0"/>
  <text x="569.5" y="131.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Test</text>
  <text x="569.5" y="151.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">15%</text>
  <text x="340.0" y="92.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" font-style="italic" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">your labeled dataset</text>
  <text x="340.0" y="206.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Fit on train, tune on validation, judge ONCE on test.</text>
  <text x="340.0" y="232.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">The test set must stay unseen — peeking at it leaks information and inflates your score.</text>
</svg>
