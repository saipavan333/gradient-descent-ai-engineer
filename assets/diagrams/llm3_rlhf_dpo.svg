  <text x="640.0" y="161.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">directly</text>
  <line x1="548.0" y1="150.0" x2="575.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M575.0,150.0 L565.9,145.9 L565.9,154.1 Z" fill="#475569"/>
  <text x="575.0" y="205.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">one step, no reward model or RL</text>
  <text x="360.0" y="300.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">both teach the model which answers humans prefer; DPO skips the separate reward model</text>
