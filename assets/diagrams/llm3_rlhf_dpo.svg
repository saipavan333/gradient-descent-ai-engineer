  <line x1="265.0" y1="150.0" x2="290.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M290.0,150.0 L280.9,145.9 L280.9,154.1 Z" fill="#475569"/>
  <text x="220.0" y="205.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">two models, a tricky RL loop</text>
  <line x1="440.0" y1="90.0" x2="440.0" y2="250.0" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6 5" stroke-linecap="round"/>
