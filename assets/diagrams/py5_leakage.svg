  <text x="190.0" y="267.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">over-optimistic, unreliable scores</text>
  <text x="545.0" y="80.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">RIGHT</text>
  <rect x="430.0" y="102.0" width="110.0" height="52.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="485.0" y="124.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">fit on</text>
  <text x="485.0" y="140.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">train only</text>
  <rect x="555.0" y="102.0" width="110.0" height="52.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="610.0" y="124.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">apply to</text>
  <text x="610.0" y="140.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">test</text>
  <line x1="540.0" y1="128.0" x2="553.0" y2="128.0" stroke="#10b981" stroke-width="2.2" stroke-linecap="round"/>
