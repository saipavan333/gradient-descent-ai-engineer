<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" width="760" height="320" role="img">
  <rect x="0" y="0" width="760" height="320" fill="#ffffff"/>
  <text x="380.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">One feature pipeline feeds training and serving</text>
  <rect x="35.0" y="131.0" width="120.0" height="58.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
