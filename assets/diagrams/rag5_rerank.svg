<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" width="720" height="300" role="img">
  <rect x="0" y="0" width="720" height="300" fill="#ffffff"/>
  <text x="360.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Two-stage retrieval: cast a wide net, then rerank precisely</text>
  <rect x="40.0" y="127.0" width="80.0" height="46.0" rx="12" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8"/>
  <text x="80.0" y="154.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">query</text>
  <rect x="195.0" y="116.0" width="110.0" height="68.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="250.0" y="139.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">retrieve</text>
  <text x="250.0" y="153.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">bi-encoder</text>
  <text x="250.0" y="168.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">(fast)</text>
  <rect x="350.0" y="122.0" width="100.0" height="56.0" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/>
  <text x="400.0" y="146.4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">top 50</text>
  <text x="400.0" y="161.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">candidates</text>
  <rect x="495.0" y="116.0" width="130.0" height="68.0" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="560.0" y="139.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">cross-encoder</text>
  <text x="560.0" y="153.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">rerank (slow,</text>
  <text x="560.0" y="168.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">accurate)</text>
  <rect x="648.0" y="127.0" width="64.0" height="46.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="680.0" y="154.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">top 5</text>
  <line x1="120.0" y1="150.0" x2="195.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M195.0,150.0 L185.9,145.9 L185.9,154.1 Z" fill="#475569"/>
  <line x1="305.0" y1="150.0" x2="350.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M350.0,150.0 L340.9,145.9 L340.9,154.1 Z" fill="#475569"/>
  <line x1="450.0" y1="150.0" x2="495.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M495.0,150.0 L485.9,145.9 L485.9,154.1 Z" fill="#475569"/>
  <line x1="625.0" y1="150.0" x2="648.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M648.0,150.0 L638.9,145.9 L638.9,154.1 Z" fill="#475569"/>
  <text x="360.0" y="250.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.6" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">cheap retriever narrows millions → 50; an expensive, accurate reranker reorders those 50 → the best 5</text>
  <text x="360.0" y="270.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">the reranker reads query+chunk together, so it judges relevance far better than vector distance alone</text>
</svg>
