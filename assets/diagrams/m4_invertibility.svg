  <line x1="140.0" y1="100.0" x2="210.0" y2="100.0" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <path d="M210.0,100.0 L200.0,95.5 L200.0,104.5 Z" fill="#475569"/>
