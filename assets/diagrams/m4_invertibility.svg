  <path d="M230.0,130.0 L300.0,118.0 L318.0,58.0 L248.0,70.0 Z" fill="#eef2ff" stroke="#6366f1" stroke-width="2" stroke-linejoin="round"/>
  <text x="280.0" y="154.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">parallelogram</text>
  <line x1="335.0" y1="100.0" x2="405.0" y2="100.0" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
