<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" width="640" height="380" role="img">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Anatomy of a Matplotlib figure</text>
  <rect x="70.0" y="70.0" width="500.0" height="250.0" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2" opacity="1.0"/>
  <text x="90.0" y="90.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#6366f1" text-anchor="start" opacity="1.0" dominant-baseline="middle">Figure</text>
  <rect x="130.0" y="110.0" width="400.0" height="170.0" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" opacity="1.0"/>
  <text x="150.0" y="128.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">Axes (the plot area)</text>
  <path d="M160,250 L220,210 L280,225 L340,170 L400,185 L470,140" fill="none" stroke="#fb7185" stroke-width="2.4"/>
  <circle cx="160.0" cy="250.0" r="3" fill="#fb7185"/>
  <circle cx="220.0" cy="210.0" r="3" fill="#fb7185"/>
  <circle cx="280.0" cy="225.0" r="3" fill="#fb7185"/>
  <circle cx="340.0" cy="170.0" r="3" fill="#fb7185"/>
  <circle cx="400.0" cy="185.0" r="3" fill="#fb7185"/>
  <circle cx="470.0" cy="140.0" r="3" fill="#fb7185"/>
  <text x="330.0" y="300.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">x-axis label</text>
  <text x="110.0" y="195.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">y</text>
  <text x="330.0" y="122.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Title</text>
  <text x="540.0" y="160.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">legend,</text>
  <text x="540.0" y="176.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">ticks,</text>
  <text x="540.0" y="192.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">labels</text>
  <text x="320.0" y="352.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">fig, ax = plt.subplots();  ax.plot(x, y);  ax.set_xlabel(...)</text>
