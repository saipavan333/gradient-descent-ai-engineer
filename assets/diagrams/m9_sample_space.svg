  <circle cx="284.0" cy="155.0" r="24.0" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="284.0" y="155.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">4</text>
