<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" width="520" height="300" role="img">
  <rect x="0" y="0" width="520" height="300" fill="#ffffff"/>
  <text x="260.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Probability = fraction of the sample space</text>
  <rect x="70.0" y="70.0" width="380.0" height="170.0" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" opacity="1.0"/>
  <text x="80.0" y="60.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">sample space Ω = {1,2,3,4,5,6}</text>
  <circle cx="110.0" cy="155.0" r="24.0" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="110.0" y="155.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">1</text>
  <circle cx="168.0" cy="155.0" r="24.0" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="168.0" y="155.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">2</text>
  <circle cx="226.0" cy="155.0" r="24.0" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
