  <rect x="35.0" y="104.0" width="150.0" height="72.0" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="110.0" y="128.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#075985" text-anchor="middle" dominant-baseline="middle">1. Pretrain</text>
  <text x="110.0" y="143.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">next-token on</text>
  <text x="110.0" y="159.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#075985" text-anchor="middle" dominant-baseline="middle">the web</text>
  <rect x="215.0" y="104.0" width="150.0" height="72.0" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="290.0" y="128.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#92400e" text-anchor="middle" dominant-baseline="middle">2. Fine-tune</text>
  <text x="290.0" y="143.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">follow</text>
  <text x="290.0" y="159.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#92400e" text-anchor="middle" dominant-baseline="middle">instructions (SFT)</text>
  <rect x="395.0" y="104.0" width="150.0" height="72.0" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="470.0" y="128.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">3. Align</text>
  <text x="470.0" y="143.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">match human</text>
  <text x="470.0" y="159.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#5b21b6" text-anchor="middle" dominant-baseline="middle">preferences (RLHF)</text>
  <rect x="580.0" y="104.0" width="150.0" height="72.0" rx="12" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8"/>
  <text x="655.0" y="128.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">4. Deploy</text>
  <text x="655.0" y="143.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">prompt, retrieve</text>
  <text x="655.0" y="159.3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">(RAG), use tools</text>
