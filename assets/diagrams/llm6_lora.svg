  <text x="145.0" y="200.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">frozen (d×d)</text>
  <text x="145.0" y="255.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">millions of weights</text>
  <text x="235.0" y="175.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="26" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">+</text>
  <rect x="270.0" y="110.0" width="34.0" height="130.0" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2" opacity="1.0"/>
  <text x="287.0" y="175.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">B</text>
  <text x="287.0" y="255.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">d×r</text>
  <text x="316.0" y="175.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="20" font-weight="400" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">·</text>
  <rect x="328.0" y="110.0" width="130.0" height="34.0" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2" opacity="1.0"/>
  <text x="393.0" y="127.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">A</text>
  <text x="393.0" y="158.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">r×d</text>
  <text x="393.0" y="255.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#065f46" text-anchor="middle" opacity="1.0" dominant-baseline="middle">trainable, rank r (tiny)</text>
  <line x1="475.0" y1="175.0" x2="520.0" y2="175.0" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M520.0,175.0 L510.9,170.9 L510.9,179.1 Z" fill="#94a3b8"/>
  <rect x="535.0" y="110.0" width="130.0" height="130.0" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2" opacity="1.0"/>
  <text x="600.0" y="170.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#312e81" text-anchor="middle" opacity="1.0" dominant-baseline="middle">W + BA</text>
  <text x="600.0" y="196.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">effective</text>
  <text x="360.0" y="300.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">only B and A are learned (r ≪ d) → a fraction of a percent of the parameters, same model quality</text>
