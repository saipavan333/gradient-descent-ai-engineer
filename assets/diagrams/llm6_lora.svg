<svg viewBox="0 0 720 330" xmlns="http://www.w3.org/2000/svg" width="720" height="330" role="img">
  <rect x="0" y="0" width="720" height="330" fill="#ffffff"/>
  <text x="360.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">LoRA: freeze the giant weight, train a tiny low-rank update</text>
  <rect x="80.0" y="110.0" width="130.0" height="130.0" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" opacity="1.0"/>
