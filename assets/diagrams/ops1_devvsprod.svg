<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" width="640" height="300" role="img">
  <rect x="0" y="0" width="640" height="300" fill="#ffffff"/>
  <text x="320.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">MLOps closes the gap: notebook → production</text>
  <rect x="50.0" y="112.0" width="200.0" height="96.0" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/>
  <text x="150.0" y="147.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#475569" text-anchor="middle" dominant-baseline="middle">Notebook / experiment</text>
  <text x="150.0" y="164.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">manual, one-off,</text>
  <text x="150.0" y="181.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="middle" dominant-baseline="middle">runs on my laptop</text>
