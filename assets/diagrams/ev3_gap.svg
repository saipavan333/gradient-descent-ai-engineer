<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" width="640" height="300" role="img">
  <rect x="0" y="0" width="640" height="300" fill="#ffffff"/>
  <text x="320.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Why online eval: a model can look better offline yet do worse live</text>
  <text x="320.0" y="64.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" font-style="italic" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">same new model, two verdicts</text>
  <rect x="85.0" y="113.0" width="210.0" height="74.0" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="190.0" y="145.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle" dominant-baseline="middle">Offline test</text>
  <text x="190.0" y="163.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#065f46" text-anchor="middle" dominant-baseline="middle">accuracy  +2%  ▲</text>
  <rect x="365.0" y="113.0" width="210.0" height="74.0" rx="12" fill="#fff1f3" stroke="#fb7185" stroke-width="1.8"/>
  <text x="470.0" y="145.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">Online A/B</text>
  <text x="470.0" y="163.1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#9f1239" text-anchor="middle" dominant-baseline="middle">engagement  −5%  ▼</text>
  <line x1="295.0" y1="150.0" x2="365.0" y2="150.0" stroke="#475569" stroke-width="2.0" stroke-linecap="round"/>
  <path d="M365.0,150.0 L355.9,145.9 L355.9,154.1 Z" fill="#475569"/>
  <rect x="281.6" y="133.8" width="96.7" height="17.8" rx="5" fill="#ffffff" opacity="0.92"/>
  <text x="330.0" y="143.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11.5" fill="#475569" text-anchor="middle" dominant-baseline="middle">reality check</text>
  <text x="320.0" y="232.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Offline metrics are proxies; only real users reveal the true effect —</text>
  <text x="320.0" y="254.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">so an offline win must be confirmed online before you trust it.</text>
</svg>
