<svg viewBox="0 0 740 320" xmlns="http://www.w3.org/2000/svg" width="740" height="320" role="img">
  <rect x="0" y="0" width="740" height="320" fill="#ffffff"/>
  <text x="370.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Three ways to give a model knowledge it lacks</text>
  <rect x="40.0" y="84.0" width="210.0" height="196.0" rx="12" fill="#ffffff" stroke="#38bdf8" stroke-width="1.8" opacity="1.0"/>
  <text x="145.0" y="110.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#075985" text-anchor="middle" opacity="1.0" dominant-baseline="middle">RAG (retrieve)</text>
  <text x="145.0" y="138.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">fetch relevant docs</text>
  <text x="145.0" y="156.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">at query time</text>
  <text x="145.0" y="196.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">fresh, private, cited</text>
  <text x="145.0" y="224.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">cheap to update</text>
  <rect x="270.0" y="84.0" width="210.0" height="196.0" rx="12" fill="#ffffff" stroke="#fb7185" stroke-width="1.8" opacity="1.0"/>
  <text x="375.0" y="110.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#9f1239" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Fine-tune</text>
  <text x="375.0" y="138.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">bake into weights</text>
  <text x="375.0" y="156.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">(train)</text>
  <text x="375.0" y="196.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">a consistent skill/style</text>
  <text x="375.0" y="224.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">not for facts</text>
  <rect x="500.0" y="84.0" width="210.0" height="196.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.8" opacity="1.0"/>
  <text x="605.0" y="110.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#5b21b6" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Long context</text>
  <text x="605.0" y="138.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">stuff it all in</text>
  <text x="605.0" y="156.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">the prompt</text>
  <text x="605.0" y="196.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">small, one-off context</text>
  <text x="605.0" y="224.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">costly, limited</text>
  <text x="370.0" y="302.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.6" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">RAG wins when knowledge is large, private, or changing — the usual production answer for 'know my data'</text>
</svg>
