<svg viewBox="0 0 720 352" xmlns="http://www.w3.org/2000/svg" width="720" height="352" role="img">
  <rect x="0" y="0" width="720" height="352" fill="#ffffff"/>
  <text x="360.0" y="26.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" opacity="1.0" dominant-baseline="middle">Trainable parameters: full fine-tuning vs LoRA vs QLoRA</text>
  <text x="150.0" y="118.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#9f1239" text-anchor="end" opacity="1.0" dominant-baseline="middle">full fine-tune</text>
  <rect x="165.0" y="100.0" width="420.0" height="32.0" rx="5" fill="#eef2ff" stroke="#fb7185" stroke-width="1.8" opacity="1.0"/>
  <text x="595.0" y="116.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="start" opacity="1.0" dominant-baseline="middle">7,000 M  (100%)</text>
  <text x="173.0" y="150.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">needs many GPUs</text>
  <text x="150.0" y="196.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#312e81" text-anchor="end" opacity="1.0" dominant-baseline="middle">LoRA</text>
  <rect x="165.0" y="178.0" width="50.4" height="32.0" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8" opacity="1.0"/>
  <text x="225.4" y="194.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="start" opacity="1.0" dominant-baseline="middle">~7 M  (0.1%)</text>
  <text x="173.0" y="228.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">one GPU, fast</text>
  <text x="150.0" y="274.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#065f46" text-anchor="end" opacity="1.0" dominant-baseline="middle">QLoRA</text>
  <rect x="165.0" y="256.0" width="33.6" height="32.0" rx="5" fill="#eef2ff" stroke="#10b981" stroke-width="1.8" opacity="1.0"/>
  <text x="208.6" y="272.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="start" opacity="1.0" dominant-baseline="middle">~7 M + 4-bit base</text>
  <text x="173.0" y="306.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#64748b" text-anchor="start" opacity="1.0" dominant-baseline="middle">a single consumer GPU</text>
  <text x="360.0" y="336.0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#64748b" text-anchor="middle" opacity="1.0" dominant-baseline="middle">LoRA trains a tiny add-on; QLoRA also 4-bit-quantizes the frozen base so a big model fits in memory</text>
</svg>
